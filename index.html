<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>세뇨르의 세계로 초대합니다</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .start-btn {
            padding: 30px 60px;
            font-size: 28px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            position: fixed;
            transition: none;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .start-btn:hover {
            background: #ff6666;
        }
        .error-window {
            position: fixed;
            background: #f0f0f0;
            border: 1px solid #999;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            animation: popIn 0.3s ease-out;
            z-index: 10;
            overflow: hidden;
            min-width: 200px;
        }
        .error-titlebar {
            background: #e81123;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .error-titlebar .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 16px;
            cursor: default;
            font-weight: bold;
        }
        .error-body {
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            background: white;
        }
        .error-icon {
            font-size: 32px;
            flex-shrink: 0;
        }
        .error-photo {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .error-text {
            font-size: 12px;
            color: #333;
            font-family: 'Segoe UI', sans-serif;
        }
        .error-footer {
            background: #f0f0f0;
            padding: 8px 12px;
            text-align: center;
            border-top: 1px solid #ddd;
        }
        .error-ok-btn {
            padding: 4px 24px;
            font-size: 12px;
            background: #e0e0e0;
            border: 1px solid #adadad;
            border-radius: 4px;
            cursor: default;
            font-family: 'Segoe UI', sans-serif;
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px red;
            z-index: 999;
            display: none;
            text-align: center;
        }
        .taunt {
            position: fixed;
            color: #ffcc00;
            font-size: 24px;
            font-weight: bold;
            z-index: 999;
            pointer-events: none;
            animation: fadeUp 1s ease-out forwards;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>
<body>
    <button class="start-btn" id="prankBtn">안누르면 곽튜브 부인</button>
    <div class="message" id="msg"> 선물입니다 </div>

    <script>
        const photos = [
            "https://i.imgur.com/APpEeFR.jpg",
            "https://i.imgur.com/QIhwv02.jpg",
            "https://i.imgur.com/qDCBjuQ.jpg",
            "https://i.imgur.com/rzlXy8c.jpg",
            "https://i.imgur.com/9YACDNE.jpg",
            "https://i.imgur.com/9VhpvJH.jpg",
            "https://i.imgur.com/COZE7ly.jpg",
            "https://i.imgur.com/dV3hI7d.jpg",
            "https://i.imgur.com/Xb97rZ0.jpg",
            "https://i.imgur.com/zfjE7S5.jpg",
            "https://i.imgur.com/CGY5KwD.jpg",
            "https://i.imgur.com/p4el6s8.jpg",
            "https://i.imgur.com/HIdfWiq.jpg",
            "https://i.imgur.com/RldweUx.jpg",
            "https://i.imgur.com/IVR6Mab.jpg",
            "https://i.imgur.com/R0LlQI8.jpg",
            "https://i.imgur.com/C2Fxj10.jpg",
            "https://i.imgur.com/fhFusNg.jpg",
            "https://i.imgur.com/SPbeGNr.jpg",
            "https://i.imgur.com/0t7QdtL.jpg",
            "https://i.imgur.com/Y2JEKXl.jpg"
        ];

        const errorMessages = [
            "세뇨르가 컴퓨터를 점령했습니다.",
            "치명적 오류: 세뇨르 과다 검출",
            "경고: 세뇨르를 삭제할 수 없습니다.",
            "오류 코드 0x세뇨르: 복구 불가",
            "시스템 경고: 세뇨르 바이러스 감염됨",
            "디스크 공간 부족: 세뇨르가 가득 참",
            "응답 없음: 세뇨르가 차단하고 있습니다",
            "블루스크린 예정: 원인 - 세뇨르",
            "Windows에서 세뇨르를 발견했습니다",
            "이 작업을 수행하려면 세뇨르의 허가가 필요합니다"
        ];

        let dodgeCount = 0;
        let count = 0;
        const btn = document.getElementById('prankBtn');
        const taunts = ["너 곽튜브 부인이야?", "아 낳은게 너인가베", "ㄱ낄끼리낄"];

        btn.addEventListener('mouseenter', function() {
            if (dodgeCount < 3) {
                const maxX = window.innerWidth - btn.offsetWidth - 20;
                const maxY = window.innerHeight - btn.offsetHeight - 20;
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;
                btn.style.left = newX + 'px';
                btn.style.top = newY + 'px';

                const taunt = document.createElement('div');
                taunt.className = 'taunt';
                taunt.textContent = taunts[dodgeCount];
                taunt.style.left = newX + 'px';
                taunt.style.top = (newY - 30) + 'px';
                document.body.appendChild(taunt);
                setTimeout(() => taunt.remove(), 1000);

                dodgeCount++;
            }
        });

        btn.addEventListener('click', function() {
            if (dodgeCount >= 3) {
                startPrank();
            }
        });

        function startPrank() {
            btn.style.display = 'none';
            document.getElementById('msg').style.display = 'block';

            const interval = setInterval(() => {
                if (count >= 60) {
                    clearInterval(interval);
                    return;
                }
                spawnErrorWindow();
                count++;
            }, 150);
        }

        function spawnErrorWindow() {
            const photo = photos[Math.floor(Math.random() * photos.length)];
            const message = errorMessages[Math.floor(Math.random() * errorMessages.length)];

            const win = document.createElement('div');
            win.className = 'error-window';
            win.style.left = Math.random() * (window.innerWidth - 280) + 'px';
            win.style.top = Math.random() * (window.innerHeight - 180) + 'px';

            win.innerHTML = `
                <div class="error-titlebar">
                    <span>⚠ Windows 오류</span>
                    <span class="close-btn">✕</span>
                </div>
                <div class="error-body">
                    <img class="error-photo" src="${photo}">
                    <div class="error-text">${message}</div>
                </div>
                <div class="error-footer">
                    <button class="error-ok-btn">확인</button>
                </div>
            `;

            document.body.appendChild(win);
        }
    </script>
</body>
</html>
