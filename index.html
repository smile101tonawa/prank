<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>세뇨르의 세계로 초대합니다</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        .start-btn {
            padding: 30px 60px;
            font-size: 28px;
            background: #ff4444;
            color: white;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            animation: pulse 1.5s infinite;
            position: fixed;
            transition: none;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .start-btn:hover {
            background: #ff6666;
        }
        .photo {
            position: fixed;
            border: 4px solid white;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            animation: popIn 0.3s ease-out;
            z-index: 10;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(var(--rotate)); opacity: 1; }
        }
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px red;
            z-index: 999;
            display: none;
            text-align: center;
        }
        .taunt {
            position: fixed;
            color: #ffcc00;
            font-size: 24px;
            font-weight: bold;
            z-index: 999;
            pointer-events: none;
            animation: fadeUp 1s ease-out forwards;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }
    </style>
</head>
<body>
    <button class="start-btn" id="prankBtn">안누르면 곽튜브 부인</button>
    <div class="message" id="msg"> 선물입니다 </div>

    <script>
        const photos = [
            "https://i.imgur.com/APpEeFR.jpg",
            "https://i.imgur.com/QIhwv02.jpg",
            "https://i.imgur.com/qDCBjuQ.jpg",
            "https://i.imgur.com/rzlXy8c.jpg",
            "https://i.imgur.com/9YACDNE.jpg",
            "https://i.imgur.com/9VhpvJH.jpg",
            "https://i.imgur.com/COZE7ly.jpg",
            "https://i.imgur.com/dV3hI7d.jpg",
            "https://i.imgur.com/Xb97rZ0.jpg",
            "https://i.imgur.com/zfjE7S5.jpg",
            "https://i.imgur.com/CGY5KwD.jpg",
            "https://i.imgur.com/p4el6s8.jpg",
            "https://i.imgur.com/HIdfWiq.jpg",
            "https://i.imgur.com/RldweUx.jpg",
            "https://i.imgur.com/IVR6Mab.jpg",
            "https://i.imgur.com/R0LlQI8.jpg",
            "https://i.imgur.com/C2Fxj10.jpg",
            "https://i.imgur.com/fhFusNg.jpg",
            "https://i.imgur.com/SPbeGNr.jpg",
            "https://i.imgur.com/0t7QdtL.jpg",
            "https://i.imgur.com/Y2JEKXl.jpg"
        ];

        let dodgeCount = 0;
        let count = 0;
        const btn = document.getElementById('prankBtn');
        const taunts = ["너 곽튜브 부인이야?", "아 낳은게 너인가베", "ㄱ낄끼리낄"];

        btn.addEventListener('mouseenter', function() {
            if (dodgeCount < 3) {
                // 버튼 도망가기
                const maxX = window.innerWidth - btn.offsetWidth - 20;
                const maxY = window.innerHeight - btn.offsetHeight - 20;
                const newX = Math.random() * maxX;
                const newY = Math.random() * maxY;
                btn.style.left = newX + 'px';
                btn.style.top = newY + 'px';

                // 도발 메시지 표시
                const taunt = document.createElement('div');
                taunt.className = 'taunt';
                taunt.textContent = taunts[dodgeCount];
                taunt.style.left = newX + 'px';
                taunt.style.top = (newY - 30) + 'px';
                document.body.appendChild(taunt);
                setTimeout(() => taunt.remove(), 1000);

                dodgeCount++;
            }
        });

        btn.addEventListener('click', function() {
            if (dodgeCount >= 3) {
                startPrank();
            }
        });

        function startPrank() {
            btn.style.display = 'none';
            document.getElementById('msg').style.display = 'block';

            const interval = setInterval(() => {
                if (count >= 80) {
                    clearInterval(interval);
                    return;
                }
                spawnPhoto();
                count++;
            }, 100);
        }

        function spawnPhoto() {
            const img = document.createElement('img');
            img.src = photos[Math.floor(Math.random() * photos.length)];
            img.className = 'photo';

            const size = 80 + Math.random() * 150;
            img.style.width = size + 'px';
            img.style.height = size + 'px';
            img.style.objectFit = 'cover';
            img.style.left = Math.random() * (window.innerWidth - size) + 'px';
            img.style.top = Math.random() * (window.innerHeight - size) + 'px';
            img.style.setProperty('--rotate', (Math.random() * 40 - 20) + 'deg');

            document.body.appendChild(img);
        }
    </script>
</body>
</html>
